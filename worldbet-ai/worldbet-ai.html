/* PWA + iPhone native feel */
:root {
  --header-h: 56px;
  --bottom-nav-h: 64px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { -webkit-text-size-adjust: 100%; }
body {
  min-height: 100dvh;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
  padding-top: var(--safe-top);
}

.app {
  min-height: 100dvh;
  padding-bottom: calc(var(--bottom-nav-h) + var(--safe-bottom));
}

button, .btn, .nav-item, .bottom-nav-item { touch-action: manipulation; }

input, select, textarea, .filters input, .filters select, .form-group input, .form-group select {
  font-size: 16px !important;
}

/* Odds chips & live flash */
.odds-row { display: flex; gap: var(--space-2); flex-wrap: wrap; margin: var(--space-3) 0; }
.odds-chip {
  flex: 1; min-width: 72px; text-align: center; padding: var(--space-2) var(--space-1);
  background: var(--color-surface-offset); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); font-size: var(--text-xs);
}
.odds-chip strong { display: block; font-family: var(--font-display); font-size: var(--text-base); color: var(--color-text); }
.odds-chip .odds-lbl { color: var(--color-text-muted); font-size: 10px; text-transform: uppercase; }
.odds-chip.odds-flash-up { animation: oddsUp 1.5s ease; border-color: var(--color-success); }
.odds-chip.odds-flash-down { animation: oddsDown 1.5s ease; border-color: var(--color-error); }
.odds-chip .odds-arrow { font-size: 10px; margin-left: 2px; }
@keyframes oddsUp { 0%,100% { background: var(--color-surface-offset); } 30% { background: rgba(0,200,83,0.25); } }
@keyframes oddsDown { 0%,100% { background: var(--color-surface-offset); } 30% { background: rgba(244,67,54,0.2); } }

.odds-live-badge {
  display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--color-text-muted);
  padding: 4px 8px; border-radius: var(--radius-full); border: 1px solid var(--color-border);
  white-space: nowrap;
}
.odds-live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); animation: pulse 2s infinite; }

.rec-odds-big { font-family: var(--font-display); font-size: var(--text-xl); color: var(--color-gold); font-weight: 700; }

/* Bottom navigation (mobile) */
.bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 110;
  height: calc(var(--bottom-nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--color-surface); border-top: 1px solid var(--color-border);
  grid-template-columns: repeat(4, 1fr); align-items: stretch;
}
.bottom-nav-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; font-size: 10px; color: var(--color-text-muted); min-height: 44px;
  padding: var(--space-1); transition: var(--transition-interactive);
}
.bottom-nav-item i, .bottom-nav-item svg { width: 22px; height: 22px; }
.bottom-nav-item.active { color: var(--color-primary); font-weight: 600; }

/* Mobile cards for tables */
.bet-card, .vb-card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-4); margin-bottom: var(--space-3);
}
.bet-card-row { display: flex; justify-content: space-between; font-size: var(--text-sm); margin: var(--space-1) 0; }
.bet-card-row span:first-child { color: var(--color-text-muted); }

/* Install banner */
.install-banner {
  position: fixed; bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 8px);
  left: var(--space-4); right: var(--space-4); z-index: 120;
  background: var(--color-surface); border: 1px solid var(--color-primary);
  border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4);
  box-shadow: var(--shadow-lg); font-size: var(--text-sm);
}
.install-banner button { margin-top: var(--space-2); }

/* Chart accordion (mobile modal) */
.chart-accordion summary {
  cursor: pointer; font-weight: 600; padding: var(--space-3) 0;
  list-style: none; display: flex; justify-content: space-between; align-items: center;
}
.chart-accordion summary::-webkit-details-marker { display: none; }

@media (max-width: 768px) {
  .bottom-nav { display: grid; }
  .sidebar, .hamburger, .sidebar-overlay { display: none !important; }
  .footer-bar { display: none; }
  .layout { flex-direction: column; }
  .main {
    padding: var(--space-3) var(--space-4);
    padding-bottom: var(--space-4);

  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-3); }

  .grid-2 { grid-template-columns: 1fr; }
  .match-grid { grid-template-columns: 1fr; }
  .view-title { font-size: var(--text-lg); margin-bottom: var(--space-4); }
  .table-wrap.desktop-only { display: none; }
  .mobile-cards { display: block; }
  .toast {
    left: var(--space-4); right: var(--space-4); bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 12px);
  }
  .modal-overlay { padding: 0; align-items: stretch; }
  .modal {
    max-width: 100%; margin: 0; min-height: 100dvh; border-radius: 0;
    border: none; display: flex; flex-direction: column;

  .chart-row { grid-template-columns: 1fr; }

  .team { font-size: var(--text-xs); }

}

@media (min-width: 769px) {

@media (display-mode: standalone) {
  .install-banner { display: none !important; }

// ========== PREDICTION ENGINE ==========
const PredictionEngine = {
  /**
   * P(X=k) = e^(-λ) * λ^k / k!
   * Distribución de Poisson para goles esperados.
   */
  poissonProbability(lambda, k) {
    return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
  },
  /**
   * Modelo Poisson bivariado: calcula probabilidades 1X2
   * a partir de fuerzas de ataque/defensa relativas.
   */
  predictMatchScore(homeAttack, homeDefense, awayAttack, awayDefense, leagueAvg = 1.35) {
    const homeLambda = homeAttack * awayDefense * leagueAvg;
    const awayLambda = awayAttack * homeDefense * leagueAvg;
    const maxGoals = 8;
    let homeWin = 0, draw = 0, awayWin = 0;
    const scoreProbabilities = [];
    for (let i = 0; i <= maxGoals; i++) {
      for (let j = 0; j <= maxGoals; j++) {
        const prob = this.poissonProbability(homeLambda, i) * this.poissonProbability(awayLambda, j);
        scoreProbabilities.push({ home: i, away: j, probability: prob });
        if (i > j) homeWin += prob;
        else if (i === j) draw += prob;
        else awayWin += prob;
      }
    }
    const sorted = [...scoreProbabilities].sort((a, b) => b.probability - a.probability);
    return {
      homeWin, draw, awayWin,
      expectedHomeGoals: homeLambda, expectedAwayGoals: awayLambda,
      mostLikelyScore: sorted[0],
      top5Scores: sorted.slice(0, 5),
      scoreProbabilities: sorted
    };
  },
  /**
   * Ajuste 60% Poisson base + 40% xG como corrector.
   */
  adjustWithXG(basePrediction, homeXGFor, homeXGAgainst, awayXGFor, awayXGAgainst) {
    const xgHomeGoals = homeXGFor * 0.6 + (1 / Math.max(awayXGAgainst, 0.3)) * 0.4;
    const xgAwayGoals = awayXGFor * 0.6 + (1 / Math.max(homeXGAgainst, 0.3)) * 0.4;
    return {
      adjustedHomeLambda: basePrediction.expectedHomeGoals * 0.6 + xgHomeGoals * 0.4,
      adjustedAwayLambda: basePrediction.expectedAwayGoals * 0.6 + xgAwayGoals * 0.4
    };
  },
  recalcFromLambdas(homeLambda, awayLambda, leagueAvg = 1.35) {
    const ha = homeLambda / leagueAvg, hd = 1, aa = awayLambda / leagueAvg, ad = 1;
    return this.predictMatchScore(ha, hd, aa, ad, leagueAvg);
  },
  /**
   * EV = (prob_modelo * cuota) - 1
   * Edge = prob_modelo - prob_implícita_mercado
   */
  detectValueBet(modelProbability, marketOdds, minEdge = 0.05) {
    const impliedProb = 1 / marketOdds;
    const edge = modelProbability - impliedProb;
    const expectedValue = modelProbability * marketOdds - 1;
    return {
      edge, expectedValue,
      isValueBet: edge > minEdge,
      confidence: edge > 0.10 ? 'HIGH' : edge > minEdge ? 'MEDIUM' : 'LOW',
      recommendation: expectedValue > 0.08 ? '✅ APOSTAR' : expectedValue > 0 ? '⚠️ CONSIDERAR' : '❌ EVITAR'
    };
  },
  /**
   * Kelly: f* = (bp - q) / b, con fracción para reducir riesgo.
   */
  kellyCriterion(modelProbability, decimalOdds, bankroll, fractionKelly = 0.25) {
    const b = decimalOdds - 1, p = modelProbability, q = 1 - p;
    const fullKelly = b > 0 ? (b * p - q) / b : 0;
    const fractionalKelly = Math.max(0, fullKelly * fractionKelly);
    return {
      fullKelly: Math.max(0, fullKelly),
      recommendedBet: fractionalKelly,
      stakeSuggestion: fractionalKelly * bankroll,
      riskLevel: fractionalKelly > 0.05 ? 'ALTO' : fractionalKelly > 0.02 ? 'MEDIO' : 'BAJO'
    };
  },
  over25Probability(homeLambda, awayLambda) {
    return 1 - this.totalGoalsUnderProbability(homeLambda, awayLambda, 2.5);
  },
  totalGoalsUnderProbability(homeLambda, awayLambda, line) {
    const max = Math.floor(line);
    let under = 0;
    for (let h = 0; h <= 8; h++) {
      for (let a = 0; a <= 8; a++) {
        if (h + a <= max) {
          under += this.poissonProbability(homeLambda, h) * this.poissonProbability(awayLambda, a);
        }
      }
    }
    return under;
  },
  bttsProbability(homeLambda, awayLambda) {
    let yes = 0;
    for (let h = 1; h <= 8; h++) {
      for (let a = 1; a <= 8; a++) {
        yes += this.poissonProbability(homeLambda, h) * this.poissonProbability(awayLambda, a);
      }
    }
    return { yes, no: 1 - yes };
  },
  firstGoalProbability(homeLambda, awayLambda) {
    const noGoals = this.poissonProbability(homeLambda, 0) * this.poissonProbability(awayLambda, 0);
    const withGoals = 1 - noGoals;
    const total = homeLambda + awayLambda;
    const homeFirst = total > 0 ? (homeLambda / total) * withGoals : 0;
    const awayFirst = total > 0 ? (awayLambda / total) * withGoals : 0;
    return { homeFirst, awayFirst, noGoals };
  },
  fairOdds(prob, margin = 0.92) {
    return prob > 0.001 ? Math.min(99, margin / prob) : 99;
  },
  pickConfidence(prob) {
    if (prob >= 0.50) return 'ALTA';
    if (prob >= 0.28) return 'MEDIA';
    return 'CULEBRA';
  },
  /**
   * Genera candidatos de apuesta desde el análisis Poisson + xG + datos API.
   */
  buildAnalysisPicks(fixture, result) {
    const p = result.prediction;
    const d = result.data;
    const hL = result.adjusted.adjustedHomeLambda;
    const aL = result.adjusted.adjustedAwayLambda;
    const picks = [];
    const add = (type, label, prob, odds) => {
      if (prob < 0.05) return;
      picks.push({
        type, label, prob,
        odds: odds || this.fairOdds(prob),
        confidence: this.pickConfidence(prob)
      });
    };

    add('ganador', `${fixture.homeTeam} gana`, p.homeWin, d.marketHomeOdds);
    add('ganador', 'Empate', p.draw, d.marketDrawOdds);
    add('ganador', `${fixture.awayTeam} gana`, p.awayWin, d.marketAwayOdds);

    const homeOrDraw = p.homeWin + p.draw;
    const awayOrDraw = p.awayWin + p.draw;
    add('doble_chance', `${fixture.homeTeam} o Empate`, homeOrDraw, this.fairOdds(homeOrDraw));
    add('doble_chance', `${fixture.awayTeam} o Empate`, awayOrDraw, this.fairOdds(awayOrDraw));

    p.top5Scores.slice(0, 3).forEach(s => {
      add('marcador', `Marcador exacto ${s.home}-${s.away}`, s.probability, this.fairOdds(s.probability));
    });

    [1.5, 2.5, 3.5].forEach(line => {
      const under = this.totalGoalsUnderProbability(hL, aL, line);
      const over = 1 - under;
      const overOdds = line === 2.5 ? (d.over25Odds || this.fairOdds(over)) : this.fairOdds(over);
      const underOdds = line === 2.5 ? (d.under25Odds || this.fairOdds(under)) : this.fairOdds(under);
      add('goles', `Over ${line} goles`, over, overOdds);
      add('goles', `Under ${line} goles`, under, underOdds);
    });

    const btts = this.bttsProbability(hL, aL);
    add('btts', 'Ambos marcan (Sí)', btts.yes, this.fairOdds(btts.yes));
    add('btts', 'Ambos marcan (No)', btts.no, this.fairOdds(btts.no));

    const fg = this.firstGoalProbability(hL, aL);
    add('primer_gol', `Primer gol: ${fixture.homeTeam}`, fg.homeFirst, this.fairOdds(fg.homeFirst));
    add('primer_gol', `Primer gol: ${fixture.awayTeam}`, fg.awayFirst, this.fairOdds(fg.awayFirst));

    return picks;
  },
  /**
   * Elige la apuesta principal de forma coherente con el análisis.
   * Por defecto = ganador del modelo; solo cambia si otro mercado es mucho más claro.
   */
  pickPrimaryBet(fixture, result, picks) {
    const p = result.prediction;
    const d = result.data;
    const winners = [
      { label: `${fixture.homeTeam} gana`, prob: p.homeWin, odds: d.marketHomeOdds, type: 'ganador' },
      { label: 'Empate', prob: p.draw, odds: d.marketDrawOdds, type: 'ganador' },
      { label: `${fixture.awayTeam} gana`, prob: p.awayWin, odds: d.marketAwayOdds, type: 'ganador' }
    ].sort((a, b) => b.prob - a.prob);
    const modelWinner = winners[0];
    const enrich = (pick, reason) => ({
      ...pick,
      primaryReason: reason,
      confidence: pick.confidence || this.pickConfidence(pick.prob)
    });
    const goalsPick = picks.find(x => x.label === (result.over25Prob >= result.under25Prob ? 'Over 2.5 goles' : 'Under 2.5 goles'));
    const bttsYes = picks.find(x => x.label === 'Ambos marcan (Sí)');
    const bttsNo = picks.find(x => x.label === 'Ambos marcan (No)');
    const bttsPick = (bttsYes?.prob || 0) >= (bttsNo?.prob || 0) ? bttsYes : bttsNo;

    if (goalsPick?.prob >= 0.65 && modelWinner.prob < 0.36) {
      return enrich(goalsPick, 'Línea de goles muy clara en el análisis');
    }
    if (bttsPick?.prob >= 0.65 && modelWinner.prob < 0.34) {
      return enrich(bttsPick, 'Ambos equipos marcan con alta probabilidad');
    }

    const winnerPick = picks.find(x => x.label === modelWinner.label) || {
      ...modelWinner, type: 'ganador', confidence: this.pickConfidence(modelWinner.prob)
    };
    return enrich(winnerPick, 'Ganador más probable según Poisson + xG + APIs');
  },
  goalsAnalysis(result) {
    const p = result.prediction;
    const ms = p.mostLikelyScore;
    const expected = p.expectedHomeGoals + p.expectedAwayGoals;
    const msTotal = ms.home + ms.away;
    const over = result.over25Prob;
    const under = result.under25Prob;
    const pickOver = over >= under;
    const label = pickOver ? 'Over 2.5 goles' : 'Under 2.5 goles';
    const prob = pickOver ? over : under;
    let note = '';
    if (msTotal <= 2 && pickOver && over < 0.62) {
      note = `Promedio ${expected.toFixed(1)} goles esperados. El ${ms.home}-${ms.away} es el marcador más probable, pero sumando todos los resultados posibles el modelo inclina levemente a +2.5 (${pct(over)}).`;
    } else if (msTotal >= 3 && !pickOver) {
      note = `El ${ms.home}-${ms.away} sugiere muchos goles, pero la distribución completa favorece Under 2.5 (${pct(under)}).`;
    } else if (pickOver) {
      note = `${expected.toFixed(1)} goles esperados en total → ${label} (${pct(prob)}).`;
    } else {
      note = `${expected.toFixed(1)} goles esperados en total → ${label} (${pct(prob)}).`;
    }
    return { label, prob, expected: expected.toFixed(1), note };
  },
  buildFeatures(fixture, data, leagueAvg) {
    return {
      homeForm: data.homeForm, awayForm: data.awayForm,
      homeXGFor: data.homeXGFor, homeXGAgainst: data.homeXGAgainst,
      awayXGFor: data.awayXGFor, awayXGAgainst: data.awayXGAgainst,
      h2hHomeWins: data.h2hHomeWins, h2hDraws: data.h2hDraws, h2hAwayWins: data.h2hAwayWins,
      h2hAvgGoals: data.h2hAvgGoals,
      homeRanking: data.homeRanking, awayRanking: data.awayRanking,
      rankingDiff: data.awayRanking - data.homeRanking,
      matchStage: fixture.stage, homeAdvantage: 0.0,
      marketHomeOdds: data.marketHomeOdds, marketDrawOdds: data.marketDrawOdds, marketAwayOdds: data.marketAwayOdds
    };
  },
  runFullPrediction(fixture, data, config) {
    const base = this.predictMatchScore(
      data.homeAttack, data.homeDefense, data.awayAttack, data.awayDefense, config.leagueAvgGoals
    );
    const adj = this.adjustWithXG(base, data.homeXGFor, data.homeXGAgainst, data.awayXGFor, data.awayXGAgainst);
    const finalPred = this.recalcFromLambdas(adj.adjustedHomeLambda, adj.adjustedAwayLambda, config.leagueAvgGoals);
    const features = this.buildFeatures(fixture, data, config.leagueAvgGoals);
    const over25Prob = this.over25Probability(adj.adjustedHomeLambda, adj.adjustedAwayLambda);
    const under25Prob = 1 - over25Prob;
    const markets = [
      { market: `${fixture.homeTeam} gana`, prob: finalPred.homeWin, odds: data.marketHomeOdds },
      { market: 'Empate', prob: finalPred.draw, odds: data.marketDrawOdds },
      { market: `${fixture.awayTeam} gana`, prob: finalPred.awayWin, odds: data.marketAwayOdds },
      { market: 'Over 2.5 goles', prob: over25Prob, odds: data.over25Odds || 1.9 },
      { market: 'Under 2.5 goles', prob: under25Prob, odds: data.under25Odds || 1.9 }
    ];
    const result = { features, base, adjusted: adj, prediction: finalPred, over25Prob, under25Prob, data };
    const analysisPicks = this.buildAnalysisPicks(fixture, result);
    result.analysisPicks = analysisPicks.map(pick => ({
      ...pick,
      kelly: this.kellyCriterion(pick.prob, pick.odds, config.bankroll, config.kellyFraction)
    })).sort((a, b) => b.prob - a.prob);
    result.valueBets = result.analysisPicks.slice(0, 6);
    result.recommendation = this.buildRecommendation(fixture, result);
    return result;
  },
  /**
   * Apuesta recomendada según análisis del modelo (no value betting vs mercado).
   */
  buildRecommendation(fixture, result) {
    const p = result.prediction;
    const ms = p.mostLikelyScore;
    const picks = result.analysisPicks || [];
    const outcomes = [
      { label: `${fixture.homeTeam} gana`, prob: p.homeWin },
      { label: 'Empate', prob: p.draw },
      { label: `${fixture.awayTeam} gana`, prob: p.awayWin }
    ].sort((a, b) => b.prob - a.prob);
    const modelWinner = outcomes[0];
    const goals = this.goalsAnalysis(result);
    const fg = this.firstGoalProbability(result.adjusted.adjustedHomeLambda, result.adjusted.adjustedAwayLambda);
    const firstGoalPick = fg.homeFirst >= fg.awayFirst
      ? { label: `Primer gol: ${fixture.homeTeam}`, prob: fg.homeFirst }
      : { label: `Primer gol: ${fixture.awayTeam}`, prob: fg.awayFirst };
    const primary = this.pickPrimaryBet(fixture, result, picks);
    const primaryKelly = picks.find(x => x.label === primary.label)?.kelly
      || this.kellyCriterion(primary.prob, primary.odds, result.data.bankroll || 1000, 0.25);
    const altPicks = picks
      .filter(pick => pick.label !== primary.label)
      .slice(0, 6);
    return {
      modelWinner: modelWinner.label,
      modelWinnerProb: modelWinner.prob,
      likelyScore: `${ms.home}-${ms.away}`,
      likelyScoreProb: ms.probability,
      expectedTotalGoals: goals.expected,
      goalsPick: goals.label,
      goalsPickProb: goals.prob,
      goalsNote: goals.note,
      firstGoalPick: firstGoalPick.label,
      firstGoalProb: firstGoalPick.prob,
      primaryBet: primary.label,
      primaryAction: '🎯 Apuesta recomendada',
      primaryReason: primary.primaryReason,
      primaryType: primary.type,
      primaryProb: primary.prob,
      primaryOdds: primary.odds,
      primaryConfidence: primary.confidence,
      primaryKelly,
      hasValueBet: false,
      picks: altPicks,
      dataSources: result.data.dataSources || ['Demo'],
      summary: `${primary.label} (${pct(primary.prob)}) @ ${primary.odds?.toFixed(2)} · Marcador ${ms.home}-${ms.away} · ${goals.label} · ${firstGoalPick.label}`
    };
  }
};

// ========== BET SETTLEMENT ==========
const BetSettlement = {
  settleBet(marketType, marketLabel, homeTeam, awayTeam, homeScore, awayScore) {
    const total = homeScore + awayScore;
    const homeWins = homeScore > awayScore;
    const awayWins = awayScore > homeScore;
    const isDraw = homeScore === awayScore;
    const bothScored = homeScore > 0 && awayScore > 0;
    const label = String(marketLabel || '').trim();

    switch (marketType) {
      case 'ganador': {
        if (/empate/i.test(label)) return isDraw ? 'won' : 'lost';
        if (label.includes(homeTeam)) return homeWins ? 'won' : 'lost';
        if (label.includes(awayTeam)) return awayWins ? 'won' : 'lost';
        return 'void';
      }
      case 'doble_chance': {
        if (label.includes(homeTeam) && /empate/i.test(label)) return (homeWins || isDraw) ? 'won' : 'lost';
        if (label.includes(awayTeam) && /empate/i.test(label)) return (awayWins || isDraw) ? 'won' : 'lost';
        return 'void';
      }
      case 'goles': {
        const overM = label.match(/Over\s+([\d.]+)/i);
        const underM = label.match(/Under\s+([\d.]+)/i);
        if (overM) return total > parseFloat(overM[1]) ? 'won' : 'lost';
        if (underM) return total < parseFloat(underM[1]) ? 'won' : 'lost';
        return 'void';
      }
      case 'btts': {
        if (/sí|si/i.test(label)) return bothScored ? 'won' : 'lost';
        if (/no/i.test(label)) return !bothScored ? 'won' : 'lost';
        return 'void';
      }
      case 'marcador': {
        const sm = label.match(/(\d+)\s*-\s*(\d+)/);
        if (sm) return (homeScore === parseInt(sm[1], 10) && awayScore === parseInt(sm[2], 10)) ? 'won' : 'lost';
        return 'void';
      }
      case 'primer_gol': {
        if (homeScore === 0 && awayScore === 0) return 'void';
        if (label.includes(homeTeam)) return homeScore > 0 && awayScore === 0 ? 'won' : (homeScore > awayScore ? 'won' : 'lost');
        if (label.includes(awayTeam)) return awayScore > 0 && homeScore === 0 ? 'won' : (awayScore > homeScore ? 'won' : 'lost');
        return 'void';
      }
      default:
        return 'void';
    }
  },
  calcPayout(stake, odds, result) {
    if (result === 'won') return stake * (odds - 1);
    return 0;
  }
};

// ========== CHART MANAGER ==========
const ChartManager = {
  instances: {},
  destroyAll() {
    Object.values(this.instances).forEach(c => c?.destroy?.());
    this.instances = {};
  },
  destroy(id) {
    if (this.instances[id]) { this.instances[id].destroy(); delete this.instances[id]; }
  },
  chartColors() {
    const dark = document.documentElement.dataset.theme !== 'light';
    return { text: dark ? '#8892aa' : '#4a5570', grid: dark ? '#2a3148' : '#dde3ed' };
  },
  createProbDoughnut(canvasId, probs, labels) {
    this.destroy(canvasId);
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    const colors = this.chartColors();
    this.instances[canvasId] = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data: probs.map(p => p * 100), backgroundColor: ['#00c853','#ff9800','#2196f3'], borderWidth: 0 }]
      },
      options: {
        plugins: { legend: { labels: { color: colors.text } } },
        cutout: '60%'
      }
    });
  },

    const ctx = document.getElementById(canvasId);

    const labels = ['0','1','2','3','4','5+'];
    const homeData = [], awayData = [];
    for (let g = 0; g < 5; g++) {
      homeData.push(PredictionEngine.poissonProbability(homeLambda, g) * 100);
      awayData.push(PredictionEngine.poissonProbability(awayLambda, g) * 100);

        scales: {
          x: { ticks: { color: colors.text }, grid: { color: colors.grid } },
          y: { ticks: { color: colors.text }, grid: { color: colors.grid } }
        },
        plugins: { legend: { labels: { color: colors.text } } }
      }
    });
  },

  createPerformanceLine(canvasId, history) {

          label: '% Acierto', data: history.map(h => h.accuracy),
          borderColor: '#00c853', backgroundColor: 'rgba(0,200,83,0.1)', fill: true, tension: 0.3
        }]
      },
      options: {
        scales: {
          x: { ticks: { color: colors.text }, grid: { color: colors.grid } },
          y: { min: 40, max: 80, ticks: { color: colors.text }, grid: { color: colors.grid } }
        },
        plugins: { legend: { labels: { color: colors.text } } }
      }
    });
  },
  renderHeatmap(containerId, scoreProbabilities) {
    const el = document.getElementById(containerId);
    if (!el) return;
    const max = 5;
    let html = '<div style="display:grid;grid-template-columns:24px repeat(5,1fr);gap:2px;font-size:9px">';
    html += '<div></div>';
    for (let j = 0; j < max; j++) html += `<div style="text-align:center;color:var(--color-text-muted)">${j}</div>`;
    let maxProb = 0;
    const probs = {};
    scoreProbabilities.forEach(s => {
      if (s.home < max && s.away < max) {
        probs[`${s.home}-${s.away}`] = s.probability;
        if (s.probability > maxProb) maxProb = s.probability;
      }
    });
    for (let i = 0; i < max; i++) {
      html += `<div style="color:var(--color-text-muted);display:flex;align-items:center">${i}</div>`;
      for (let j = 0; j < max; j++) {
        const p = probs[`${i}-${j}`] || 0;
        const intensity = maxProb > 0 ? p / maxProb : 0;
        const bg = `rgba(0,200,83,${0.15 + intensity * 0.85})`;
        html += `<div class="heatmap-cell" style="background:${bg}" title="${i}-${j}: ${pct(p)}">${p > 0.02 ? pct(p) : ''}</div>`;
      }
    }
    html += '</div>';
    el.innerHTML = html;
  }
};

/** Cliente Supabase — requiere window.SUPABASE_CONFIG { url, anonKey } */
const SupabaseClient = {
  _client: null,

  isConfigured() {
    const cfg = window.SUPABASE_CONFIG;
    return !!(cfg?.url && cfg?.anonKey && !cfg.url.includes('YOUR_PROJECT'));
  },

  getClient() {
    if (!this.isConfigured()) return null;
    if (!this._client && typeof supabase !== 'undefined') {
      this._client = supabase.createClient(
        window.SUPABASE_CONFIG.url,
        window.SUPABASE_CONFIG.anonKey,
        {
          auth: {
            detectSessionInUrl: true,
            persistSession: true,
            flowType: 'pkce'
          }
        }
      );
    }
    return this._client;
  },

  async invokeFunction(name) {
    const client = this.getClient();
    if (!client) return { ok: false, error: 'Supabase no configurado' };
    try {
      const { data, error } = await client.functions.invoke(name, { body: {} });
      if (error) return { ok: false, error: error.message };
      return { ok: true, data };
    } catch (e) {
      return { ok: false, error: e.message };
    }
  }
};

/** Autenticación email/contraseña y perfil de usuario */
class AuthManager {
  constructor(app) {
    this.app = app;
    this.user = null;
    this.profile = null;
    this.listeners = [];
  }

  onChange(fn) { this.listeners.push(fn); }
  _notify() { this.listeners.forEach(fn => fn(this.user, this.profile)); }

  get isLoggedIn() { return !!this.user; }

  async init() {
    const client = SupabaseClient.getClient();
    if (!client) return;
    // Procesa el enlace de confirmación de email (?code=... en la URL)
    if (window.location.search.includes('code=') || window.location.hash.includes('access_token')) {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (code) await client.auth.exchangeCodeForSession(code).catch(() => {});
      window.history.replaceState({}, document.title, window.location.pathname);
    }
    const { data: { session } } = await client.auth.getSession();
    if (session?.user) {
      this.user = session.user;
      await this.loadProfile();
    }
    client.auth.onAuthStateChange(async (_event, session) => {
      this.user = session?.user ?? null;
      if (this.user) await this.loadProfile();
      else this.profile = null;
      this._notify();
      if (this.app) this.app.onAuthChange();
    });
  }

  async loadProfile() {
    const client = SupabaseClient.getClient();
    if (!client || !this.user) return null;
    const { data, error } = await client
      .from('profiles')
      .select('*')
      .eq('id', this.user.id)
      .single();
    if (!error && data) {
      this.profile = data;
      if (this.app?.config) {
        this.app.config.bankroll = parseFloat(data.bankroll) || 1000;
        const el = document.getElementById('bankroll-quick');
        if (el) el.value = this.app.config.bankroll;
      }
    }
    return this.profile;
  }

  async signUp(email, password, displayName) {
    const client = SupabaseClient.getClient();
    if (!client) throw new Error('Backend no configurado. Añade SUPABASE_URL y SUPABASE_ANON_KEY.');
    const { data, error } = await client.auth.signUp({
      email,
      password,
      options: {
        data: { display_name: displayName || email.split('@')[0] },
        emailRedirectTo: window.location.origin + window.location.pathname
      }
    });
    if (error) throw error;
    return data;
  }

  async signIn(email, password) {
    const client = SupabaseClient.getClient();
    if (!client) throw new Error('Backend no configurado');
    const { data, error } = await client.auth.signInWithPassword({ email, password });
    if (error) throw error;
    this.user = data.user;
    await this.loadProfile();
    this._notify();
    return data;
  }

  async signOut() {
    const client = SupabaseClient.getClient();
    if (!client) return;
    await client.auth.signOut();
    this.user = null;
    this.profile = null;
    this._notify();
  }

  async updateBankroll(amount) {
    const client = SupabaseClient.getClient();
    if (!client || !this.user) return;
    const { error } = await client
      .from('profiles')
      .update({ bankroll: amount })
      .eq('id', this.user.id);
    if (!error && this.profile) this.profile.bankroll = amount;
  }

  displayName() {
    return this.profile?.display_name || this.user?.email?.split('@')[0] || 'Usuario';
  }
}

/** Apuestas virtuales, snapshots y sync con Supabase */
class BetsManager {
  constructor(app) {
    this.app = app;
    this.userBets = [];
    this.snapshots = {};
  }

  get client() { return SupabaseClient.getClient(); }

  async syncMatchesFromServer() {
    return SupabaseClient.invokeFunction('sync-matches');
  }

  async upsertMatches(fixtures) {
    const client = this.client;
    if (!client || !fixtures?.length) return;
    const rows = fixtures.map(f => ({
      id: f.id,
      match_number: f.matchNumber,
      home_team: f.homeTeam,
      away_team: f.awayTeam,
      kickoff_utc: f.kickoffUtc,
      match_date: f.date,
      stage: f.stage,
      group_name: f.group || null,
      stadium: f.stadium || '',
      host_city: f.hostCity || '',
      status: f.status || 'scheduled',
      home_score: f.homeScore ?? null,
      away_score: f.awayScore ?? null,
      is_placeholder: f.isPlaceholder || false,
      synced_at: new Date().toISOString()
    }));
    await client.from('matches').upsert(rows, { onConflict: 'id' });
  }

  async loadDbMatches() {
    const client = this.client;
    if (!client) return [];
    const { data } = await client.from('matches').select('*').order('kickoff_utc');
    return data || [];
  }

  mergeDbStatusIntoFixtures(fixtures, dbMatches) {
    if (!dbMatches?.length) return fixtures;
    const map = Object.fromEntries(dbMatches.map(m => [m.id, m]));
    return fixtures.map(f => {
      const db = map[f.id];
      if (!db) return f;
      return {
        ...f,
        status: db.status || f.status,
        homeScore: db.home_score,
        awayScore: db.away_score
      };
    });
  }

  async saveSnapshot(matchId, recommendation, dataSources) {
    const client = this.client;
    if (!client || !recommendation) return null;
    const existing = this.snapshots[matchId];
    if (existing?.computed_at) {
      const age = Date.now() - new Date(existing.computed_at).getTime();
      if (age < 60 * 60 * 1000) return existing.id;
    }
    const { data, error } = await client
      .from('prediction_snapshots')
      .insert({
        match_id: matchId,
        recommendation,
        data_sources: dataSources || []
      })
      .select('id')
      .single();
    if (!error && data) {
      this.snapshots[matchId] = { id: data.id, recommendation, computed_at: new Date().toISOString() };
      return data.id;
    }
    return null;
  }

  async loadSnapshotsForMatches(matchIds) {
    const client = this.client;
    if (!client || !matchIds?.length) return;
    const { data } = await client
      .from('prediction_snapshots')
      .select('id, match_id, recommendation, data_sources, computed_at')
      .in('match_id', matchIds)
      .order('computed_at', { ascending: false });
    if (!data) return;
    data.forEach(s => {
      if (!this.snapshots[s.match_id]) {
        this.snapshots[s.match_id] = s;
      }
    });
  }

  async loadLatestSnapshots(limit = 50) {
    const client = this.client;
    if (!client) return [];
    const { data } = await client
      .from('prediction_snapshots')
      .select('id, match_id, recommendation, data_sources, computed_at, matches(home_team, away_team, status, home_score, away_score, kickoff_utc)')
      .order('computed_at', { ascending: false })
      .limit(limit);
    return data || [];
  }

  async loadUserBets() {
    const client = this.client;
    if (!client || !this.app.auth?.user) return [];
    const { data, error } = await client
      .from('user_bets')
      .select('*, matches(home_team, away_team, kickoff_utc, status, home_score, away_score)')
      .order('placed_at', { ascending: false });
    if (error) {
      console.warn('loadUserBets', error);
      return [];
    }
    this.userBets = data || [];
    return this.userBets;
  }

  async placeBet({ matchId, marketType, marketLabel, odds, stake, snapshotId }) {
    const client = this.client;
    if (!client) throw new Error('Backend no configurado');
    if (!this.app.auth?.isLoggedIn) throw new Error('Debes iniciar sesión para guardar apuestas');

    const fixture = this.app.fixtures.find(f => f.id === matchId);
    if (fixture && new Date(fixture.kickoffUtc) <= new Date()) {
      throw new Error('El partido ya empezó');
    }

    const { data, error } = await client.rpc('place_user_bet', {
      p_match_id: matchId,
      p_market_type: marketType,
      p_market_label: marketLabel,
      p_odds: odds,
      p_stake: stake,
      p_snapshot_id: snapshotId || null
    });
    if (error) throw new Error(error.message);

    await this.app.auth.loadProfile();
    await this.loadUserBets();
    return data;
  }

  getUserBetMatchIds() {
    return [...new Set(this.userBets.map(b => b.match_id))];
  }

  getStats() {
    const bets = this.userBets;
    const settled = bets.filter(b => b.status === 'won' || b.status === 'lost');
    const won = bets.filter(b => b.status === 'won');
    const lost = bets.filter(b => b.status === 'lost');
    const pending = bets.filter(b => b.status === 'pending');
    const totalStaked = settled.reduce((s, b) => s + parseFloat(b.stake), 0);
    const totalReturn = won.reduce((s, b) => s + parseFloat(b.stake) + parseFloat(b.payout || 0), 0);
    const roi = totalStaked > 0 ? ((totalReturn - totalStaked) / totalStaked) * 100 : 0;
    return { won: won.length, lost: lost.length, pending: pending.length, roi, totalStaked };
  }

  statusLabel(status) {
    return { pending: 'Pendiente', won: 'Ganada', lost: 'Perdida', void: 'Anulada' }[status] || status;
  }

  statusClass(status) {
    return { pending: 'value-med', won: 'value-high', lost: 'value-low', void: '' }[status] || '';
  }
}

/** Cuotas live desde Supabase match_odds + Realtime */
class OddsLiveManager {
  constructor(app) {
    this.app = app;
    this.odds = {};
    this.deltas = {};
    this.lastUpdated = null;
    this.channel = null;
    this.pollTimer = null;
  }

  get client() { return SupabaseClient.getClient(); }

  async init() {
    if (!this.client) return;
    await this.loadAll();
    this.subscribeRealtime();
    this.pollTimer = setInterval(() => this.loadAll(), 60000);
  }

  async loadAll() {
    if (!this.client) return;
    const { data } = await this.client.from('match_odds').select('*');
    if (!data) return;
    data.forEach((row) => this.applyRow(row, false));
    this.updateBadge();
  }

  subscribeRealtime() {
    if (!this.client || this.channel) return;
    this.channel = this.client
      .channel('match_odds_live')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'match_odds' }, (payload) => {
        const row = payload.new || payload.old;
        if (row?.match_id) this.applyRow(row, true);
        this.updateBadge();
        if (this.app?.currentView) this.app.refreshOddsUI();
      })
      .subscribe();
  }

  applyRow(row, animate) {
    const prev = this.odds[row.match_id];
    const next = {
      home: Number(row.home_odds),
      draw: Number(row.draw_odds),
      away: Number(row.away_odds),
      over25: row.over25_odds != null ? Number(row.over25_odds) : null,
      under25: row.under25_odds != null ? Number(row.under25_odds) : null,
      bookmaker: row.bookmaker,
      updatedAt: row.updated_at
    };
    if (animate && prev) {
      this.deltas[row.match_id] = {
        home: this.dir(prev.home, next.home),
        draw: this.dir(prev.draw, next.draw),
        away: this.dir(prev.away, next.away)
      };
      setTimeout(() => { delete this.deltas[row.match_id]; }, 1600);
    }
    this.odds[row.match_id] = next;
    if (row.updated_at) this.lastUpdated = row.updated_at;
  }

  dir(oldV, newV) {
    if (oldV == null || newV == null || oldV === newV) return 'same';
    return newV > oldV ? 'up' : 'down';
  }

  has(matchId) { return !!this.odds[matchId]?.home; }

  get(matchId) { return this.odds[matchId] || null; }

  getDelta(matchId) { return this.deltas[matchId] || {}; }

  applyToMatchData(matchId, data) {
    const o = this.get(matchId);
    if (!o) return data;
    if (o.home) data.marketHomeOdds = o.home;
    if (o.draw) data.marketDrawOdds = o.draw;
    if (o.away) data.marketAwayOdds = o.away;
    if (o.over25) data.over25Odds = o.over25;
    if (o.under25) data.under25Odds = o.under25;
    const bmName = o.bookmaker || 'Mercado live';
    data.bookmakers = data.bookmakers || {};
    data.bookmakers[bmName] = { home: o.home, draw: o.draw, away: o.away };
    if (data.lineMovement) data.lineMovement.current = o.home;
    if (!data.dataSources.includes('Cuotas live (servidor)')) {
      data.dataSources.push('Cuotas live (servidor)');
    }
    return data;
  }

  minutesAgo() {
    if (!this.lastUpdated) return null;
    return Math.max(0, Math.floor((Date.now() - new Date(this.lastUpdated)) / 60000));
  }

  updateBadge() {
    const el = document.getElementById('odds-live-badge');
    if (!el) return;
    const mins = this.minutesAgo();
    if (mins == null || !Object.keys(this.odds).length) {
      el.style.display = 'none';
      return;
    }
    el.style.display = 'flex';
    el.querySelector('.odds-live-label').textContent = mins < 1 ? 'Cuotas · ahora' : `Cuotas · hace ${mins} min`;
  }

  chipClass(matchId, field) {
    const d = this.getDelta(matchId)[field];
    if (d === 'up') return 'odds-flash-up';
    if (d === 'down') return 'odds-flash-down';
    return '';
  }

  arrow(matchId, field) {
    const d = this.getDelta(matchId)[field];
    if (d === 'up') return '<span class="odds-arrow">↑</span>';
    if (d === 'down') return '<span class="odds-arrow">↓</span>';
    return '';
  }
}

// ========== WORLDBET AI MAIN CLASS ==========
/** Config por defecto — API keys vía variables de entorno en build o Configuración */
const DEFAULT_CONFIG = {
  thestatsapiKey: (typeof window !== 'undefined' && window.API_KEYS?.thestatsapi) || '',
  worldcupApiKey: (typeof window !== 'undefined' && window.API_KEYS?.worldcup) || '',
  oddsApiKey: (typeof window !== 'undefined' && window.API_KEYS?.odds) || '',
  apifootballKey: (typeof window !== 'undefined' && window.API_KEYS?.apifootball) || '',
  corsProxy: 'https://corsproxy.io/?',
  bankroll: 1000,
  kellyFraction: 0.25,
  minEdge: 0.05,
  leagueAvgGoals: 1.35,
  predictionWindowDays: 7
};

class WorldBetAI {
  constructor() {
    this.config = { ...DEFAULT_CONFIG };
    this.fixtures = [];
    this.predictions = {};
    this.odds = {};
    this.valueBets = [];
    this.modelHistory = [
      { week: 'Sem 1', accuracy: 52 }, { week: 'Sem 2', accuracy: 55 },
      { week: 'Sem 3', accuracy: 58 }, { week: 'Sem 4', accuracy: 54 },
      { week: 'Sem 5', accuracy: 61 }, { week: 'Sem 6', accuracy: 63 }
    ];
    this.aiHistory = [];
    this.currentView = 'dashboard';
    this.demoMode = true;
    this.loading = false;
    this.error = null;
    this.filters = { group: '', stage: '', date: '', team: '', status: '' };
    this.countdownInterval = null;
    this.apiClient = new ApiClient(this.config);
    this.selectedMatchId = null;
    this.vbFilters = { minEv: 0, confidence: '', stage: '' };
    this.matchDataCache = {};
    this.oddsEventsCache = null;
    this.apiTrust = {
      tested: false,
      testing: false,
      trusted: false,
      validCount: 0,
      results: {}
    };
    this.auth = new AuthManager(this);
    this.bets = new BetsManager(this);
    this.oddsLive = new OddsLiveManager(this);
    this.authModalOpen = false;
    this.betFilter = '';
  }

  hasConfiguredKeys() {
    return !!(this.config.thestatsapiKey || this.config.apifootballKey || this.config.worldcupApiKey);
  }

  apiTrustLabels() {
    return {
      thestats: 'TheStatsAPI',
      worldcup: 'WorldCupAPI',
      apifootball: 'API-Football',
      odds: 'Cuotas live (servidor)'
    };
  }

  async runApiValidation() {
    this.apiTrust.testing = true;
    this.updateApiStatus();

    const labels = this.apiTrustLabels();
    const entries = [
      ['thestats', !!this.config.thestatsapiKey, () => this.apiClient.testTheStatsApi()],
      ['worldcup', !!this.config.worldcupApiKey, () => this.apiClient.testWorldCupApi()],
      ['apifootball', !!this.config.apifootballKey, () => this.apiClient.testApiFootball()]
    ];

    const results = {};
    let validConfigured = 0;
    const validSources = [];

    for (const [key, configured, fn] of entries) {
      if (!configured) {
        results[key] = { ok: false, msg: 'Sin configurar', skipped: true };
        continue;
      }
      const r = await fn();
      results[key] = r;
      if (r.ok) {
        validConfigured++;
        validSources.push(labels[key]);
      }
    }

    this.apiTrust = {
      tested: true,
      testing: false,
      trusted: validConfigured > 0,
      validCount: validConfigured,
      validSources,
      results
    };
    this.demoMode = !this.apiTrust.trusted;
    this.updateApiStatus();
    if (this.apiTrust.trusted) {
      this.matchDataCache = {};
      this.oddsEventsCache = null;
      await this.computeAllPredictions();
    }
    return this.apiTrust;
  }

  loadSessionPrefs() {
    try {
      const theme = sessionStorage.getItem('wb_theme');
      if (theme) document.documentElement.dataset.theme = theme;
      const bankroll = sessionStorage.getItem('wb_bankroll');
      if (bankroll) this.config.bankroll = parseFloat(bankroll);
    } catch {}
  }

  saveSessionPrefs() {
    try {
      sessionStorage.setItem('wb_theme', document.documentElement.dataset.theme);
      sessionStorage.setItem('wb_bankroll', String(this.config.bankroll));
    } catch {}
  }

  async init() {
    this.loadSessionPrefs();
    this.bindEvents();
    document.getElementById('bankroll-quick').value = this.config.bankroll;
    if (SupabaseClient.isConfigured()) {
      await this.auth.init();
      this.updateAuthHeader();
    }
    await this.loadAllFixtures();
    if (SupabaseClient.isConfigured()) {
      await this.bets.syncMatchesFromServer().catch(() => {});
      await this.bets.upsertMatches(this.fixtures).catch(() => {});
      const dbMatches = await this.bets.loadDbMatches();
      this.fixtures = this.bets.mergeDbStatusIntoFixtures(this.fixtures, dbMatches);
      if (this.auth.isLoggedIn) await this.bets.loadUserBets();
      await this.oddsLive.init();
    }
    if (this.hasConfiguredKeys()) {
      this.apiClient = new ApiClient(this.config);
      await this.runApiValidation();
      if (!this.apiTrust.trusted) await this.computeAllPredictions();
    } else {
      await this.computeAllPredictions();
    }
    this.navigate('dashboard');
    this.updateFooter();
    this.startCountdown();
    this.registerServiceWorker();
    this.showIosInstallBanner();
  }

  registerServiceWorker() {
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  showIosInstallBanner() {
    if (window.matchMedia('(display-mode: standalone)').matches) return;
    try { if (localStorage.getItem('wb_install_dismissed')) return; } catch {}
    const ua = navigator.userAgent || '';
    const isIos = /iphone|ipad|ipod/i.test(ua);
    const isSafari = /safari/i.test(ua) && !/crios|fxios|edgios/i.test(ua);
    if (!isIos || !isSafari) return;
    const root = document.getElementById('install-banner-root');
    if (!root) return;
    root.innerHTML = `
      <div class="install-banner" id="install-banner" role="dialog" aria-label="Instalar app">
        <strong>Instalar en iPhone</strong>
        <p style="margin:var(--space-2) 0;font-size:var(--text-xs);color:var(--color-text-muted)">
          Pulsa <strong>Compartir</strong> en Safari y elige <strong>Añadir a pantalla de inicio</strong>.
        </p>
        <button type="button" class="btn btn-outline btn-sm" id="btn-dismiss-install">Entendido</button>
      </div>`;
    document.getElementById('btn-dismiss-install')?.addEventListener('click', () => {
      try { localStorage.setItem('wb_install_dismissed', '1'); } catch {}
      root.innerHTML = '';
    });
  }

  onAuthChange() {
    this.updateAuthHeader();
    if (this.auth.isLoggedIn) {
      this.bets.loadUserBets().then(() => {
        this.computeAllPredictions().then(() => this.render());
      });
    } else {
      this.bets.userBets = [];
      this.render();

  openAuthModal() {

        <div class="modal" style="max-width:420px">
          <div class="modal-header">
            <h2>Acceder a WorldBet</h2>

          </div>

      btn.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t === btn));

        document.getElementById('auth-panel-register').style.display = btn.dataset.authTab === 'register' ? '' : 'none';

  bindEvents() {
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => this.navigate(btn.dataset.view));
    });
    document.querySelectorAll('[data-bottom-nav]').forEach(btn => {
      btn.addEventListener('click', () => this.navigate(btn.dataset.view));
    });
    document.getElementById('btn-theme').addEventListener('click', () => this.toggleTheme());
    document.getElementById('bankroll-quick').addEventListener('change', e => {
      this.config.bankroll = parseFloat(e.target.value) || 1000;
      this.saveSessionPrefs();
      if (this.auth.isLoggedIn) this.auth.updateBankroll(this.config.bankroll);
      this.computeAllPredictions().then(() => this.render());
    });
    document.getElementById('btn-hamburger').addEventListener('click', () => this.toggleSidebar(true));
    document.getElementById('sidebar-overlay').addEventListener('click', () => this.toggleSidebar(false));
    document.getElementById('logo-link').addEventListener('click', e => { e.preventDefault(); this.navigate('dashboard'); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') this.closeModal();
    });
  }

  toggleSidebar(open) {
    document.getElementById('sidebar').classList.toggle('open', open);
    document.getElementById('sidebar-overlay').classList.toggle('open', open);
  }

  toggleTheme() {
    const html = document.documentElement;
    html.dataset.theme = html.dataset.theme === 'light' ? 'dark' : 'light';
    this.saveSessionPrefs();
    const icon = document.querySelector('#btn-theme i');
    if (icon) icon.setAttribute('data-lucide', html.dataset.theme === 'light' ? 'moon' : 'sun');
    lucide.createIcons();
    this.render();
  }

  normalizeFixture(f) {
    const isPlaceholder = isPlaceholderTeam(f.homeTeam) || isPlaceholderTeam(f.awayTeam);
    const kickoffUtc = f.kickoffUtc || f.date;
    let status = 'scheduled';
    const rawStatus = (f.status || '').toLowerCase();
    if (['finished', 'ft', 'complete'].includes(rawStatus)) status = 'finished';
    else if (['live', 'inplay', '1h', '2h'].includes(rawStatus)) status = 'live';
    else if (f.homeScore != null && f.awayScore != null) status = 'finished';

    return {
      id: `wc-${String(f.matchNumber).padStart(3, '0')}`,
      matchNumber: f.matchNumber,
      homeTeam: f.homeTeam, awayTeam: f.awayTeam,
      stage: f.stage, group: f.group,
      kickoffUtc, date: f.date || kickoffUtc?.slice(0, 10),
      stadium: f.stadium, hostCity: f.hostCity,
      isPlaceholder, status,
      homeScore: f.homeScore ?? f.home_score ?? null,
      awayScore: f.awayScore ?? f.away_score ?? null
    };
  }

  getFixturesForPrediction() {
    const now = Date.now();
    const windowMs = (this.config.predictionWindowDays || 7) * 24 * 60 * 60 * 1000;
    const betMatchIds = new Set(this.bets.getUserBetMatchIds());
    return this.fixtures.filter(f => {
      if (f.isPlaceholder) return false;
      const kick = new Date(f.kickoffUtc).getTime();
      const inWindow = kick > now - 24 * 60 * 60 * 1000 && kick < now + windowMs;
      const hasBet = betMatchIds.has(f.id);
      const isRecent = kick > now - 14 * 24 * 60 * 60 * 1000 && kick <= now;
      return inWindow || hasBet || isRecent;
    });
  }

  async ensurePrediction(matchId) {
    if (this.predictions[matchId]) return this.predictions[matchId];
    const f = this.fixtures.find(x => x.id === matchId);
    if (!f || f.isPlaceholder) return null;
    const data = await this.getMatchData(f);
    if (!data) return null;
    const pred = PredictionEngine.runFullPrediction(f, data, this.config);
    this.predictions[f.id] = pred;
    await this.persistSnapshot(f.id, pred);
    this.rebuildValueBets();
    return pred;
  }

  async persistSnapshot(matchId, pred) {
    if (!SupabaseClient.isConfigured() || !pred?.recommendation) return null;
    return this.bets.saveSnapshot(
      matchId,
      pred.recommendation,
      pred.recommendation.dataSources || pred.data?.dataSources
    );
  }

  rebuildValueBets() {
    this.valueBets = [];
    Object.entries(this.predictions).forEach(([matchId, pred]) => {
      const f = this.fixtures.find(x => x.id === matchId);
      if (!f) return;
      (pred.valueBets || pred.analysisPicks?.slice(0, 6) || []).forEach(pick => {
        this.valueBets.push({
          matchId: f.id, match: `${f.homeTeam} vs ${f.awayTeam}`,
          stage: f.stage, date: f.kickoffUtc,
          market: pick.label, prob: pick.prob, odds: pick.odds,
          confidence: pick.confidence, type: pick.type,
          kelly: pick.kelly,
          recommendation: pred.recommendation
        });
      });
    });
    this.valueBets.sort((a, b) => b.prob - a.prob);
  }

  async loadAllFixtures() {
    this.loading = true;
    this.error = null;
    try {
      const raw = await this.apiClient.loadAllFixtures();
      if (!raw.length) throw new Error('No se pudieron cargar los fixtures');
      this.fixtures = raw.map(f => this.normalizeFixture(f));
      this.showToast('104 partidos cargados correctamente');
    } catch (err) {
      this.error = err.message;
      this.fixtures = this.getFallbackFixtures();
    }
    this.loading = false;
    this.updateApiStatus();
  }

  getFallbackFixtures() {
    const teams = [['Mexico','South Africa'],['Brazil','Morocco'],['Argentina','France'],['England','Germany']];
    return teams.map((t, i) => this.normalizeFixture({
      matchNumber: i + 1, date: '2026-06-11', kickoffUtc: '2026-06-11T19:00:00Z',
      stage: 'group-stage', group: 'A', homeTeam: t[0], awayTeam: t[1],
      stadium: 'Estadio', hostCity: 'ciudad'
    }));
  }

  async getMatchData(fixture) {
    const key = fixture.id;
    if (this.matchDataCache[key]) return this.matchDataCache[key];
    if (fixture.isPlaceholder) return null;

    let data = DemoDataGenerator.getMatchData(fixture);
    data.dataSources = ['Demo (Poisson + xG simulado)'];

    if (this.apiTrust.trusted) {
      try {
        if (this.oddsLive?.has(key)) {
          this.oddsLive.applyToMatchData(key, data);
        } else if (this.config.oddsApiKey) {
          if (!this.oddsEventsCache) this.oddsEventsCache = await this.apiClient.fetchOddsApiEvents();
          const oddsData = this.apiClient.parseOddsApiForMatch(this.oddsEventsCache, fixture.homeTeam, fixture.awayTeam);
          if (oddsData) {
            Object.assign(data, oddsData);
            data.dataSources.push('The Odds API (cuotas reales)');
          }
        }
        if (this.config.apifootballKey) {
          const [homeForm, awayForm, h2h] = await Promise.all([
            this.apiClient.fetchTeamForm(fixture.homeTeam),
            this.apiClient.fetchTeamForm(fixture.awayTeam),
            this.apiClient.fetchHeadToHead(fixture.homeTeam, fixture.awayTeam)
          ]);
          if (homeForm?.fixtures?.response?.length) {
            data.homeForm = homeForm.fixtures.response.slice(0, 5).map(f => {
              const side = f.teams.home.id === homeForm.teamId ? 'home' : 'away';
              const g = f.goals;
              if (g.home === g.away) return 'D';
              const won = (side === 'home' && g.home > g.away) || (side === 'away' && g.away > g.home);
              return won ? 'W' : 'L';
            });
            data.dataSources.push('API-Football (forma local)');
          }
          if (awayForm?.fixtures?.response?.length) {
            data.awayForm = awayForm.fixtures.response.slice(0, 5).map(f => {
              const side = f.teams.home.id === awayForm.teamId ? 'home' : 'away';
              const g = f.goals;
              if (g.home === g.away) return 'D';
              const won = (side === 'home' && g.home > g.away) || (side === 'away' && g.away > g.home);
              return won ? 'W' : 'L';
            });
            data.dataSources.push('API-Football (forma visitante)');
          }
          if (h2h?.response?.length) {
            const matches = h2h.response.slice(0, 5);
            let w = 0, d = 0, l = 0, goals = 0;
            matches.forEach(m => {
              goals += (m.goals.home || 0) + (m.goals.away || 0);
              if (m.goals.home === m.goals.away) d++;
              else if (teamsMatch(m.teams.home.name, fixture.homeTeam)) {
                w += m.goals.home > m.goals.away ? 1 : 0;
                l += m.goals.home < m.goals.away ? 1 : 0;
              } else {
                w += m.goals.away > m.goals.home ? 1 : 0;
                l += m.goals.away < m.goals.home ? 1 : 0;
              }
            });
            data.h2hHomeWins = w; data.h2hDraws = d; data.h2hAwayWins = l;
            data.h2hAvgGoals = goals / Math.max(matches.length, 1);
            data.dataSources.push('API-Football (H2H)');
          }
        }
      } catch { /* mantiene datos demo parciales */ }
    } else if (this.oddsLive?.has(key)) {
      this.oddsLive.applyToMatchData(key, data);
    }

    data.dataSources = [...new Set(data.dataSources)];
    this.matchDataCache[key] = data;
    return data;
  }

  async computeAllPredictions() {
    const toProcess = this.getFixturesForPrediction();
    const matchIds = toProcess.map(f => f.id);
    if (SupabaseClient.isConfigured()) {
      await this.bets.loadSnapshotsForMatches(matchIds);
    }
    for (const f of toProcess) {
      const data = await this.getMatchData(f);
      if (!data) continue;
      const pred = PredictionEngine.runFullPrediction(f, data, this.config);
      this.predictions[f.id] = pred;
      await this.persistSnapshot(f.id, pred);
    }
    this.rebuildValueBets();
  }

  refreshAllPredictions() {
    return this.computeAllPredictions();
  }

  refreshOddsUI() {
    Object.keys(this.oddsLive?.odds || {}).forEach((matchId) => {
      if (this.matchDataCache[matchId]) {
        this.oddsLive.applyToMatchData(matchId, this.matchDataCache[matchId]);
      }
    });
    if (['today', 'groups', 'knockout', 'dashboard', 'valuebets'].includes(this.currentView)) {
      this.render();
    }
    if (this.selectedMatchId && document.getElementById('modal-overlay')) {
      const pred = this.predictions[this.selectedMatchId];
      if (pred?.data) {
        const chips = document.getElementById('modal-odds-chips');
        if (chips) chips.outerHTML = this.renderOddsChips(this.selectedMatchId, pred.data, 'modal-odds-chips');
      }
    }
  }

  renderOddsChips(matchId, data, idAttr) {
    const h = data?.marketHomeOdds;
    const d = data?.marketDrawOdds;
    const a = data?.marketAwayOdds;
    if (!h) return '';
    const ol = this.oddsLive;
    const fc = (f) => ol?.chipClass(matchId, f) || '';
    const ar = (f) => ol?.arrow(matchId, f) || '';
    const id = idAttr ? ` id="${idAttr}"` : '';
    return `<div class="odds-row"${id}>
      <div class="odds-chip ${fc('home')}"><span class="odds-lbl">1</span><strong>${h.toFixed(2)}${ar('home')}</strong></div>
      <div class="odds-chip ${fc('draw')}"><span class="odds-lbl">X</span><strong>${d ? d.toFixed(2) : '—'}${ar('draw')}</strong></div>
      <div class="odds-chip ${fc('away')}"><span class="odds-lbl">2</span><strong>${a ? a.toFixed(2) : '—'}${ar('away')}</strong></div>
    </div>`;
  }

    const confCls = rec.primaryConfidence === 'ALTA' ? 'rec-box-value' : rec.primaryConfidence === 'CULEBRA' ? 'rec-box-culebra' : 'rec-box-model';
    const goalsLine = rec.goalsNote
      ? `${rec.expectedTotalGoals} esp. · ${escapeHtml(rec.goalsPick)} (${pct(rec.goalsPickProb)})`
      : `${rec.expectedTotalGoals} esp. · ${escapeHtml(rec.goalsPick)}`;
    if (compact) {
      return `<div class="rec-box ${confCls} compact">
        <div class="rec-primary">${escapeHtml(rec.primaryAction)} <strong>${escapeHtml(rec.primaryBet)}</strong>
        ${rec.primaryOdds ? `<span class="rec-odds-big">${rec.primaryOdds.toFixed(2)}</span>` : ''}</div>
        <div class="rec-detail">${pct(rec.primaryProb)} · Marcador ${rec.likelyScore} · ${goalsLine}</div>
      </div>`;
    }
    const picksHtml = (rec.picks || []).slice(0, 6).map(p => `
      <div class="rec-pick-row">
        <span>${escapeHtml(p.label)}</span>
        <span>${pct(p.prob)} · @ ${p.odds.toFixed(2)} <span class="rec-conf rec-conf-${p.confidence.toLowerCase()}">${p.confidence}</span></span>
      </div>`).join('');
    return `<div class="rec-box ${confCls}">
      <div class="rec-label">APUESTA RECOMENDADA · ${rec.primaryConfidence || 'ANÁLISIS'}</div>
      <div class="rec-primary">${escapeHtml(rec.primaryAction)} <strong>${escapeHtml(rec.primaryBet)}</strong>
        ${rec.primaryOdds ? `<span class="rec-odds-big">${rec.primaryOdds.toFixed(2)}</span>` : ''}
        <span style="font-size:var(--text-sm);color:var(--color-text-muted)">(${pct(rec.primaryProb)})</span></div>
      ${rec.primaryReason ? `<div class="rec-detail" style="margin-bottom:var(--space-2)">${escapeHtml(rec.primaryReason)}</div>` : ''}
      <div class="rec-grid">
        <div><span class="rec-k">Ganador modelo</span><br>${escapeHtml(rec.modelWinner)} (${pct(rec.modelWinnerProb)})</div>
        <div><span class="rec-k">Marcador probable</span><br>${rec.likelyScore} (${pct(rec.likelyScoreProb)})</div>
        <div><span class="rec-k">Goles totales</span><br>${goalsLine}</div>
        <div><span class="rec-k">Primer gol</span><br>${escapeHtml(rec.firstGoalPick)} (${pct(rec.firstGoalProb)})</div>
        ${rec.primaryKelly ? `<div><span class="rec-k">Kelly 1/4</span><br>${euro(rec.primaryKelly.stakeSuggestion)}</div>` : ''}
      </div>
      ${rec.goalsNote ? `<div class="rec-detail" style="margin:var(--space-2) 0;font-size:var(--text-xs)">ℹ️ ${escapeHtml(rec.goalsNote)}</div>` : ''}
      ${picksHtml ? `<div class="rec-picks"><div class="rec-k" style="margin-bottom:var(--space-2)">Otras opciones del análisis</div>${picksHtml}</div>` : ''}
      <div class="rec-sources">Fuentes: ${rec.dataSources.map(escapeHtml).join(' · ')}</div>
    </div>`;
  }

  updateApiStatus() {
    const dot = document.getElementById('api-dot');
    const text = document.getElementById('api-status-text');
    const container = document.getElementById('api-status');
    if (!dot || !text || !container) return;

    let dotClass = 'api-dot';
    let label = 'DEMO';
    let title = 'Datos simulados. Configura tus API keys y pulsa Probar APIs.';
    container.className = 'api-status';

    if (this.apiTrust.testing) {
      dotClass += ' pending';
      label = 'VERIFICANDO...';
      title = 'Comprobando conexión con las APIs configuradas...';
      container.classList.add('unverified');
    } else if (this.apiTrust.tested && this.apiTrust.trusted) {
      dotClass += ' gold';
      label = 'APIS VERIFICADAS';
      title = `Fuentes validadas: ${this.apiTrust.validSources.join(', ')}. Puedes confiar en los datos de mercado.`;
      container.classList.add('verified');
      this.demoMode = false;
    } else if (this.apiTrust.tested && this.hasConfiguredKeys() && !this.apiTrust.trusted) {
      dotClass += ' err';
      label = 'APIS FALLIDAS';
      title = 'Ninguna API configurada respondió. Revisa las keys y el proxy CORS.';
      container.classList.add('failed');
      this.demoMode = true;
    } else if (this.hasConfiguredKeys()) {
      dotClass += ' pending';
      label = 'SIN VERIFICAR';
      title = 'Keys guardadas. Pulsa Probar APIs para activar el modo verificado.';
      container.classList.add('unverified');
      this.demoMode = true;
    } else {
      this.demoMode = true;
    }

    if (this.error) {
      dotClass = 'api-dot err';
      label = 'ERROR';
      title = this.error;
      container.className = 'api-status failed';
    }

    dot.className = dotClass;
    text.textContent = label;
    container.title = title;
    container.setAttribute('aria-label', title);

    const footer = document.getElementById('footer-mode');
    if (footer) {
      footer.textContent = this.apiTrust.trusted
        ? `Modo: LIVE VERIFICADO · ${this.apiTrust.validCount} API(s)`
        : this.hasConfiguredKeys() && !this.apiTrust.tested
          ? 'Modo: DEMO (sin verificar)'
          : 'Modo: DEMO';
    }
  }

  updateFooter() {
    document.getElementById('footer-update').textContent =
      'Última actualización: ' + new Date().toLocaleString('es-ES');
  }

  startCountdown() {
    if (this.countdownInterval) clearInterval(this.countdownInterval);
    this.countdownInterval = setInterval(() => {
      const el = document.getElementById('countdown-timer');
      if (!el) return;
      const next = this.getNextMatch();
      if (!next) { el.textContent = '--:--:--'; return; }
      const diff = new Date(next.kickoffUtc) - Date.now();
      if (diff <= 0) { el.textContent = '¡En juego!'; return; }
      const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
      el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);
  }

  getNextMatch() {
    const now = Date.now();
    return this.fixtures.filter(f => !f.isPlaceholder && f.status !== 'finished' && new Date(f.kickoffUtc) > now)
      .sort((a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc))[0];
  }

  getFilteredFixtures(view) {
    let list = [...this.fixtures];
    const today = new Date().toISOString().slice(0, 10);
    if (view === 'today') list = list.filter(f => f.date === today);
    if (view === 'groups') list = list.filter(f => f.stage === 'group-stage');
    if (view === 'knockout') list = list.filter(f => f.stage !== 'group-stage');
    if (this.filters.group) list = list.filter(f => f.group === this.filters.group);
    if (this.filters.stage) list = list.filter(f => f.stage === this.filters.stage);
    if (this.filters.date) list = list.filter(f => f.date === this.filters.date);
    if (this.filters.team) {
      const t = this.filters.team.toLowerCase();
      list = list.filter(f => f.homeTeam.toLowerCase().includes(t) || f.awayTeam.toLowerCase().includes(t));
    }
    if (this.filters.status) list = list.filter(f => f.status === this.filters.status);
    return list.sort((a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc));
  }

  matchStatusBadge(f) {
    const labels = { scheduled: 'Programado', live: 'En juego', finished: 'Finalizado' };
    const cls = { scheduled: 'badge-group', live: 'badge-value', finished: 'badge-tbd' };
    return `<span class="badge ${cls[f.status] || 'badge-group'}">${labels[f.status] || f.status}</span>`;
  }

  navigate(view) {
    this.currentView = view;
    ChartManager.destroyAll();
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
    document.querySelectorAll('[data-bottom-nav]').forEach(n => n.classList.toggle('active', n.dataset.view === view));
    this.toggleSidebar(false);
    this.render();
  }

  render() {
    const main = document.getElementById('main-content');
    if (this.loading) { main.innerHTML = '<div class="skeleton" style="height:300px"></div>'; return; }
    if (this.error && !this.fixtures.length) {
      main.innerHTML = `<div class="error-state card"><p>${escapeHtml(this.error)}</p><button class="btn btn-primary" onclick="app.loadAllFixtures().then(()=>app.render())">Reintentar</button></div>`;
      return;
    }
    switch (this.currentView) {
      case 'dashboard': main.innerHTML = this.renderDashboard(); break;
      case 'today':
      case 'groups':
      case 'knockout': main.innerHTML = this.renderFixtures(this.currentView); break;
      case 'valuebets': main.innerHTML = this.renderValueBets(); break;
      case 'mybets': main.innerHTML = this.renderMyBets(); break;
      case 'history': main.innerHTML = this.renderHistory(); break;
      case 'ai': main.innerHTML = this.renderAIAnalysis(); break;
      case 'settings': main.innerHTML = this.renderSettings(); break;
    }
    lucide.createIcons();
    if (this.currentView === 'dashboard') {
      this.initDashboardCharts();
      this.animateKPIs();
    }
    if (this.currentView === 'history') this.loadHistoryView();
    this.bindViewEvents();
  }

  animateKPIs() {
    if (typeof countUp === 'undefined') return;
    document.querySelectorAll('[data-countup]').forEach(el => {
      const target = parseFloat(el.dataset.countup);
      const cu = new countUp.CountUp(el, target, {
        duration: 1.5,
        decimalPlaces: el.dataset.decimals ? 1 : 0,
        suffix: el.dataset.suffix || ''
      });
      if (!cu.error) cu.start();
    });
  }

  async loadHistoryView() {
    const el = document.getElementById('history-list');
    if (!el) return;
    if (!SupabaseClient.isConfigured()) {
      el.innerHTML = '<div class="empty-state card"><p>Backend no configurado</p></div>';
      return;
    }
    const snapshots = await this.bets.loadLatestSnapshots(40);
    if (!snapshots.length) {
      el.innerHTML = '<div class="empty-state card"><p>Aún no hay snapshots. Se guardan al analizar partidos.</p></div>';
      return;
    }
    el.innerHTML = snapshots.map(s => {
      const m = s.matches || {};
      const rec = s.recommendation || {};
      const result = m.status === 'finished' && m.home_score != null
        ? `<span class="badge badge-tbd">Resultado: ${m.home_score}-${m.away_score}</span>` : '';
      return `<div class="card" style="margin-bottom:var(--space-3)">
        <strong>${escapeHtml(m.home_team || '')} vs ${escapeHtml(m.away_team || '')}</strong>
        ${result}
        <p style="font-size:var(--text-sm);margin:var(--space-2) 0">${escapeHtml(rec.summary || rec.primaryBet || '')}</p>
        <p style="font-size:var(--text-xs);color:var(--color-text-muted)">Actualizado: ${new Date(s.computed_at).toLocaleString('es-ES')}</p>
      </div>`;
    }).join('');
  }
